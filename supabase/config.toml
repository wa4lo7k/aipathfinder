# Pathfinder-AI — Supabase CLI Configuration
# https://supabase.com/docs/guides/cli/config

project_id = "pathfinder-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true

[auth]
enabled = true

[edge_runtime]
enabled = true
inspector_port = 8083

[functions]
[functions.ai-chat]
verify_jwt = true

[functions.job-search]
verify_jwt = true

[functions.career-recommendations]
verify_jwt = true

[functions.resume-analyzer]
verify_jwt = true

[functions.profile-sync]
verify_jwt = true
